<svg width="360" height="720" viewBox="0 0 360 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="720" fill="#F6F4EE"/>
  <rect x="30" y="28" width="300" height="664" rx="22" fill="#FFFFFF" stroke="#D9D4C8"/>
  <rect x="30" y="28" width="300" height="54" rx="22" fill="#F4F1E9"/>
  <rect x="30" y="58" width="300" height="24" fill="#F4F1E9"/>
  <text x="52" y="61" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="16">&#8592;</text>
  <text x="74" y="61" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Settings</text>

  <text x="48" y="112" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Notifications</text>
  <rect x="48" y="126" width="264" height="62" rx="14" fill="#FFFFFF" stroke="#D9D4C8"/>
  <text x="64" y="163" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="12">Browser notifications</text>
  <rect x="256" y="145" width="40" height="22" rx="11" fill="#1D9E75"/>
  <circle cx="283" cy="156" r="9" fill="#FFFFFF"/>

  <text x="48" y="228" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Default check interval</text>
  <rect x="48" y="242" width="264" height="86" rx="14" fill="#FFFFFF" stroke="#D9D4C8"/>
  <rect x="64" y="266" width="48" height="28" rx="8" fill="#FFFFFF" stroke="#D9D4C8"/>
  <text x="88" y="284" text-anchor="middle" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">30s</text>
  <rect x="120" y="266" width="54" height="28" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="147" y="284" text-anchor="middle" fill="#185FA5" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">1 min</text>
  <rect x="182" y="266" width="54" height="28" rx="8" fill="#FFFFFF" stroke="#D9D4C8"/>
  <text x="209" y="284" text-anchor="middle" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">5 min</text>
  <rect x="244" y="266" width="54" height="28" rx="8" fill="#FFFFFF" stroke="#D9D4C8"/>
  <text x="271" y="284" text-anchor="middle" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">15 min</text>

  <text x="48" y="368" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Advanced</text>
  <rect x="48" y="382" width="264" height="116" rx="14" fill="#FFFFFF" stroke="#D9D4C8"/>
  <text x="64" y="409" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">Connectivity target</text>
  <rect x="64" y="420" width="232" height="36" rx="10" fill="#FAF8F4" stroke="#D9D4C8"/>
  <text x="78" y="443" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="12">8.8.8.8</text>
  <text x="64" y="472" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="10">Uses an HTTP/HTTPS connectivity probe</text>
  <text x="64" y="487" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="10">instead of raw ICMP ping in Chromium.</text>

  <text x="48" y="538" fill="#A64242" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Danger</text>
  <rect x="48" y="552" width="264" height="62" rx="14" fill="#FCEBEB" stroke="#F2B7B7"/>
  <text x="64" y="589" fill="#A64242" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Clear all monitors</text>

  <text x="48" y="638" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Why it feels product-ready</text>
  <text x="48" y="664" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">- Configuration stays compact and honest</text>
  <text x="48" y="682" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">  about real browser limitations</text>
</svg>
