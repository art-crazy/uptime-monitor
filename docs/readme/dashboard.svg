<svg width="360" height="720" viewBox="0 0 360 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="720" fill="#F6F4EE"/>
  <rect x="30" y="28" width="300" height="664" rx="22" fill="#FFFFFF" stroke="#D9D4C8"/>
  <rect x="30" y="28" width="300" height="54" rx="22" fill="#F4F1E9"/>
  <rect x="30" y="58" width="300" height="24" fill="#F4F1E9"/>
  <text x="52" y="61" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Uptime Monitor</text>
  <rect x="280" y="44" width="28" height="22" rx="8" fill="#FFFFFF" stroke="#D9D4C8"/>
  <circle cx="294" cy="55" r="3" fill="#7A7A7A"/>

  <rect x="48" y="102" width="264" height="70" rx="14" fill="#EAF3DE" stroke="#C0DD97"/>
  <circle cx="68" cy="136" r="7" fill="#6B9F2A"/>
  <text x="84" y="131" fill="#2E5310" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Internet connection</text>
  <text x="84" y="152" fill="#3B6D11" font-family="Segoe UI, Arial, sans-serif" font-size="12">Online - 128 ms response</text>

  <rect x="48" y="194" width="264" height="66" rx="14" fill="#FFFFFF" stroke="#D9D4C8"/>
  <circle cx="64" cy="227" r="5" fill="#6B9F2A"/>
  <text x="78" y="223" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">example.com</text>
  <text x="78" y="242" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">99.9% uptime</text>
  <text x="250" y="229" fill="#3B6D11" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">98 ms</text>
  <text x="288" y="229" fill="#8A8A8A" font-family="Segoe UI, Arial, sans-serif" font-size="18">&#8250;</text>

  <rect x="48" y="270" width="264" height="66" rx="14" fill="#FCEBEB" stroke="#F2B7B7"/>
  <circle cx="64" cy="303" r="5" fill="#E24B4A"/>
  <text x="78" y="299" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">api.example.com</text>
  <text x="78" y="318" fill="#A64242" font-family="Segoe UI, Arial, sans-serif" font-size="11">Down - 2 min ago</text>
  <rect x="230" y="289" width="54" height="20" rx="6" fill="#E24B4A"/>
  <text x="257" y="303" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">DOWN</text>
  <text x="292" y="303" fill="#8A8A8A" font-family="Segoe UI, Arial, sans-serif" font-size="18">&#8250;</text>

  <rect x="48" y="346" width="264" height="66" rx="14" fill="#FFFFFF" stroke="#D9D4C8"/>
  <circle cx="64" cy="379" r="5" fill="#6B9F2A"/>
  <text x="78" y="375" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">store.example.com</text>
  <text x="78" y="394" fill="#7A7A7A" font-family="Segoe UI, Arial, sans-serif" font-size="11">100% uptime</text>
  <text x="238" y="381" fill="#D08113" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">680 ms</text>
  <text x="288" y="381" fill="#8A8A8A" font-family="Segoe UI, Arial, sans-serif" font-size="18">&#8250;</text>

  <rect x="48" y="430" width="264" height="46" rx="14" fill="#FFFFFF" stroke="#D9D4C8" stroke-dasharray="6 6"/>
  <text x="180" y="458" text-anchor="middle" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">+ Add monitor</text>

  <text x="48" y="530" fill="#171717" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Why it feels product-ready</text>
  <text x="48" y="558" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">- Live connectivity state at the top</text>
  <text x="48" y="578" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">- Clear separation between healthy</text>
  <text x="48" y="596" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">  and failing monitors</text>
  <text x="48" y="620" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">- Response times are readable at popup scale</text>
  <text x="48" y="640" fill="#6E6A60" font-family="Segoe UI, Arial, sans-serif" font-size="12">- Empty and populated states feel intentional</text>
</svg>
